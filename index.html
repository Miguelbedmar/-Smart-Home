<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART HOME</title>
    <link rel="stylesheet" href="CSS/smartHome.css">   
    <style>
    .grid-container{  /* Conteiner grid para la colocación de elementos  en filas y columnas*/
        display: grid;

    }
    </style>
</head>
<body>
    <input type="checkbox" id="theme-toggle" class=" theme-input">

        <!-- HEADER--->
       <header class="header">  
        <h1 class="header-title">MI SMART HOME</h1>
        <label for="theme-toggle" class="theme-toggle">
            <span class="theme-icon"></span>
        </label>
       </header> 

       <main class="dashboard"> <!--Definimos el contenido principal que tendrá nuestra pagina-->
        <!---widget de  temperatura-->
        <div class="content-widget">
            <span class="icon">🌡️</span>
            <p class="widget__label"> Temperatura</p>
            <p class="widget_value"> 23°C</p>            
        </div>
        <!--Widget controlador de luces --->
        <div class="content-widget">
          <span class="icon">💡</span>  
            <p class="widget__label"> Luces</p>
            <p class="widget_value">ON</p>
        </div>
        <!--Widget informante del consumo total--->
        <div class="content-widget">
           <span class="icon">⚡</span>     
            <p class="widget__label">Consumo</p>
            <p class="widget_value">450W</p>
        </div>
        <!---Widget de vigilancia-->
        <div class="content-widget">
           <span class="icon">📸</span>     
            <p class="widget__label">Camara</p>
            <p class="widget_value">3 Activas</p>           
        </div>
        <!---Widget vigilante de seguridad--->
        <div class="content-widget">
            <span class="icon">🔐</span>     
            <p class="widget__label">Seguridad</p>
            <p class="widget_value">Cerrada</p>     
        </div>
        <!--Widget controlador principal de música--->
        <div class="content-widget">
            <span class="icon">🎵</span>     
            <p class="widget__label">Música</p>
            <p class="widget_value">Sonando</p>   
        </div>

        <div class="content-widget">
            <span class="icon">⏰</span>
            <p class="widget__label">Alarma</p>
            <p class="widget_value">Activada</p>
        </div>

        <div class="content-widget">
            <span class="icon">💧</span>
            <p class="widget__label">Agua gastada</p>
            <p class="widget_value">75%</p>
        </div>
        <div class="content-widget">
            <span class="icon">🪟</span>
            <p class="widget__label">Ventanas</p>
            <p class="widget_value">Abiertas</p>
        </div>
       </main>

       <!---FOOTER --->
    <footer class="footer">
        <p class="footer-title"> SMART HOME</p>
        <div class="icons-footer">
         <span>🏡</span>
         <span>📧</span>
         <span>⚙️</span>    
        </div>
        <p class="links"> CONTACTO|AYUDA</p>
        <p class="copyright"> @copyrightsmarthome2026</p>
    </footer>

</body>
</html>
